<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Gastos</title>
    <!-- Tailwind CSS para un diseño limpio y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4 font-sans">

    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Control de Gastos</h1>
        
        <!-- Formulario de Registro -->
        <form id="expense-form" class="space-y-4 mb-8">
            <div>
                <label class="block text-sm font-medium text-gray-700">Monto</label>
                <input type="number" id="amount" step="0.01" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Categoría</label>
                <select id="category" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Alimentación">Alimentación</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Pagos de Servicios">Pagos de Servicios</option>
                    <option value="Gasolina">Gasolina</option>
                    <option value="Insumos de Taller">Insumos de Taller</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Descripción (Opcional)</label>
                <input type="text" id="description" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Repuestos, almorzo, etc.">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Fecha</label>
                <input type="date" id="date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700 transition duration-200">Registrar Gasto</button>
        </form>

        <hr class="mb-6">

        <!-- Resumen Total -->
        <div class="bg-blue-50 p-4 rounded-lg mb-6 flex justify-between items-center">
            <span class="text-blue-800 font-semibold text-lg">Total Gastado:</span>
            <span id="total-amount" class="text-2xl font-bold text-blue-950">0.00</span>
        </div>

        <!-- Lista de Gastos -->
        <div>
            <h2 class="text-lg font-semibold text-gray-700 mb-3">Historial de Gastos</h2>
            <ul id="expense-list" class="space-y-2 max-h-60 overflow-y-auto">
                <!-- Los gastos se inyectarán aquí dinámicamente -->
            </ul>
        </div>
    </div>

    <script>
        // Lógica de la Aplicación
        const expenseForm = document.getElementById('expense-form');
        const expenseList = document.getElementById('expense-list');
        const totalAmountEl = document.getElementById('total-amount');

        // Cargar gastos guardados o inicializar vacío
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

        // Establecer la fecha de hoy por defecto
        document.getElementById('date').valueAsDate = new Date();

        function updateUI() {
            // Limpiar lista
            expenseList.innerHTML = '';
            let total = 0;

            // Renderizar cada gasto
            expenses.forEach((expense, index) => {
                total += parseFloat(expense.amount);

                const li = document.createElement('li');
                li.className = "flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-200 shadow-sm";
                li.innerHTML = `
                    <div class="flex-1">
                        <div class="flex justify-between mb-1">
                            <span class="font-semibold text-gray-800">${expense.category}</span>
                            <span class="text-sm text-gray-500">${expense.date}</span>
                        </div>
                        <p class="text-sm text-gray-600">${expense.description || 'Sin descripción'}</p>
                    </div>
                    <div class="flex items-center ml-4">
                        <span class="font-bold text-gray-900 mr-3">${parseFloat(expense.amount).toFixed(2)}</span>
                        <button onclick="deleteExpense(${index})" class="text-red-500 hover:text-red-700 font-bold text-sm">✕</button>
                    </div>
                `;
                expenseList.appendChild(li);
            });

            // Actualizar total
            totalAmountEl.textContent = total.toFixed(2);
            
            // Guardar en LocalStorage
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        // Agregar Gasto
        expenseForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const newExpense = {
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value
            };

            expenses.unshift(newExpense); // Añadir al inicio de la lista
            updateUI();

            // Resetear formulario (excepto la fecha)
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('date').valueAsDate = new Date();
        });

        // Eliminar Gasto
        function deleteExpense(index) {
            expenses.splice(index, 1);
            updateUI();
        }

        // Cargar datos al iniciar
        updateUI();
    </script>
</body>
</html>
