<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Gastos</title>
    <!-- Tailwind CSS para un diseño limpio y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4 font-sans">

    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-6 border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center flex items-center justify-center gap-2">
            📊 Control de Gastos Personales
        </h1>
        
        <!-- Formulario de Registro -->
        <form id="expense-form" class="space-y-4 mb-8 bg-slate-50 p-4 rounded-xl border border-slate-200">
            <h3 class="text-sm font-semibold text-slate-700 uppercase tracking-wider mb-2">Nuevo Registro</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Monto</label>
                    <input type="number" id="amount" step="0.01" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-white border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Fecha</label>
                    <input type="date" id="date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-white border focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Categoría</label>
                <select id="category" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-white border focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Alimentación">Alimentación</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Pagos de Servicios">Pagos de Servicios</option>
                    <option value="Gasolina">Gasolina</option>
                    <option value="Insumos de Taller">Insumos de Taller</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Descripción (Opcional)</label>
                <input type="text" id="description" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-white border focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej. Almuerzo, repuestos, etc.">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md font-semibold hover:bg-blue-700 transition duration-200 shadow-md">Registrar Gasto</button>
        </form>

        <!-- Resumen Total -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-5 rounded-xl mb-6 text-white shadow-md flex justify-between items-center">
            <div>
                <span class="text-blue-100 block text-sm font-medium uppercase tracking-wider">Total Gastado</span>
                <span class="text-3xl font-black"><span id="total-amount">0.00</span></span>
            </div>
            <button id="export-btn" type="button" class="bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1">
                📥 Exportar CSV
            </button>
        </div>

        <!-- Distribución Visual Breve -->
        <div class="mb-6">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Distribución de Gastos</h3>
            <div id="category-bars" class="space-y-1.5 text-xs text-gray-600">
                <!-- Barras generadas dinámicamente -->
            </div>
        </div>

        <hr class="mb-6 border-slate-200">

        <!-- Buscador y Filtros -->
        <div class="mb-4 grid grid-cols-2 gap-2">
            <input type="text" id="search-input" placeholder="🔍 Buscar descripción..." class="p-2 border rounded-md text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <select id="filter-category" class="p-2 border rounded-md text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="Todos">Todas las categorías</option>
                <option value="Alimentación">Alimentación</option>
                <option value="Transporte">Transporte</option>
                <option value="Pagos de Servicios">Pagos de Servicios</option>
                <option value="Gasolina">Gasolina</option>
                <option value="Insumos de Taller">Insumos de Taller</option>
                <option value="Otros">Otros</option>
            </select>
        </div>

        <!-- Lista de Gastos -->
        <div>
            <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-3">Historial de Gastos</h2>
            <ul id="expense-list" class="space-y-2 max-h-72 overflow-y-auto pr-1">
                <!-- Los gastos se inyectarán aquí dinámicamente -->
            </ul>
        </div>
    </div>

    <script>
        const expenseForm = document.getElementById('expense-form');
        const expenseList = document.getElementById('expense-list');
        const totalAmountEl = document.getElementById('total-amount');
        const categoryBars = document.getElementById('category-bars');
        const searchInput = document.getElementById('search-input');
        const filterCategory = document.getElementById('filter-category');
        const exportBtn = document.getElementById('export-btn');

        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

        document.getElementById('date').valueAsDate = new Date();

        const catColors = {
            "Alimentación": "bg-amber-500",
            "Transporte": "bg-sky-500",
            "Pagos de Servicios": "bg-purple-500",
            "Gasolina": "bg-orange-500",
            "Insumos de Taller": "bg-emerald-500",
            "Otros": "bg-slate-400"
        };

        function updateUI() {
            expenseList.innerHTML = '';
            let total = 0;
            let catTotals = { "Alimentación": 0, "Transporte": 0, "Pagos de Servicios": 0, "Gasolina": 0, "Insumos de Taller": 0, "Otros": 0 };

            const searchTerm = searchInput.value.toLowerCase();
            const selectedCategory = filterCategory.value;

            expenses.forEach(expense => {
                total += parseFloat(expense.amount);
                if (catTotals[expense.category] !== undefined) {
                    catTotals[expense.category] += parseFloat(expense.amount);
                } else {
                    catTotals["Otros"] += parseFloat(expense.amount);
                }
            });

            expenses.forEach((expense, index) => {
                const matchesSearch = (expense.description || '').toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === "Todos" || expense.category === selectedCategory;

                if (matchesSearch && matchesCategory) {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center p-3 bg-white rounded-xl border border-slate-100 shadow-sm transition hover:shadow-md";
                    li.innerHTML = `
                        <div class="flex-1">
                            <div class="flex justify-between mb-0.5">
                                <div class="flex items-center gap-1.5">
                                    <span class="inline-block w-2 h-2 rounded-full ${catColors[expense.category] || 'bg-slate-400'}"></span>
                                    <span class="font-bold text-slate-800 text-sm">${expense.category}</span>
                                </div>
                                <span class="text-xs text-slate-400 font-medium">${expense.date}</span>
                            </div>
                            <p class="text-xs text-slate-500 pl-3.5 italic">${expense.description || 'Sin descripción'}</p>
                        </div>
                        <div class="flex items-center ml-4">
                            <span class="font-bold text-slate-900 text-sm mr-3">${parseFloat(expense.amount).toFixed(2)}</span>
                            <button onclick="deleteExpense(${index})" class="text-slate-300 hover:text-red-500 font-bold text-base transition p-1">✕</button>
                        </div>
                    `;
                    expenseList.appendChild(li);
                }
            });

            totalAmountEl.textContent = total.toFixed(2);
            
            categoryBars.innerHTML = '';
            Object.keys(catTotals).forEach(cat => {
                const catAmount = catTotals[cat];
                if (catAmount > 0) {
                    const percentage = total > 0 ? ((catAmount / total) * 100).toFixed(0) : 0;
                    const barContainer = document.createElement('div');
                    barContainer.className = "space-y-0.5";
                    barContainer.innerHTML = `
                        <div class="flex justify-between text-[11px] font-medium text-slate-600">
                            <span>${cat}</span>
                            <span class="font-bold">${catAmount.toFixed(2)} (${percentage}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="h-full ${catColors[cat] || 'bg-slate-400'}" style="width: ${percentage}%"></div>
                        </div>
                    `;
                    categoryBars.appendChild(barContainer);
                }
            });
            
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        expenseForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const newExpense = {
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value
            };

            expenses.unshift(newExpense);
            updateUI();

            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('date').valueAsDate = new Date();
        });

        function deleteExpense(index) {
            if(confirm("¿Estás seguro de eliminar este registro?")) {
                expenses.splice(index, 1);
                updateUI();
            }
        }

        searchInput.addEventListener('input', updateUI);
        filterCategory.addEventListener('change', updateUI);

        exportBtn.addEventListener('click', () => {
            if (expenses.length === 0) return alert("No hay datos para exportar.");
            
            let csvContent = "data:text/csv;charset=utf-8,Fecha,Categoria,Monto,Descripcion\n";
            expenses.forEach(e => {
                let desc = (e.description || '').replace(/,/g, " ");
                csvContent += `${e.date},${e.category},${e.amount},${desc}\n`;
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "historial_gastos.csv");
            document.body.appendChild(link);
            link.click();
